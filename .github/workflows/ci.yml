name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true

      # The API client in internal/api is generated from api/openapi.yaml. Fail
      # if the committed file is out of sync with the spec, so the generated
      # client is never hand-edited or left stale.
      - name: Verify generated client is up to date
        run: |
          go generate ./...
          git diff --exit-code -- internal/api/anytype.gen.go

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -cover ./...
